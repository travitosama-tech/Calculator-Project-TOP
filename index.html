<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <link rel="stylesheet" href="styles.css">
        <script src="javascript.js" defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
        <title>Calculator</title>
    </head>
    <body>
        <div class="calculator-container">
            <div class="Display">0</div>
                <div class="number-container">
                    <div class="button-row" style="display: flex; flex-direction: row; justify-content: center; width: 100%;">
                        <div class="main-buttons" style="display: flex; flex-direction: column; align-items: center; flex: 1;">
                            <div class="first-numbers">
                                <button id="One">1</button>
                                <button id="Two">2</button>
                                <button id="Three">3</button>
                            </div>
                            <div class="second-numbers">
                                <button id="Four">4</button>
                                <button id="Five">5</button>
                                <button id="Six">6</button>
                            </div>
                            <div class="third-numbers">
                                <button id="Seven">7</button>
                                <button id="Eight">8</button>
                                <button id="Nine">9</button>
                            </div>
                            <div class="misc-buttons">
                                <button id="Zero">0</button>
                                <button id="Decimal">.</button>
                                <button id="Equals">=</button>
                            </div>
                        </div>
                        <div class="side-buttons" style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start;">
                            <div class="operator-buttons">
                                <button id="Add" class="Operator">+</button>
                                <button id="Subtract" class="Operator">-</button>
                                <button id="Multiply" class="Operator">*</button>
                                <button id="Divide" class="Operator">/</button>
                            </div>
                            <button id="Clear" class="button">Clear</button>
                        </div>
                    </div>
